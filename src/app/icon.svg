<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="ClaudeGUI mascot">
  <title>ClaudeGUI</title>
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F1AC8C"/>
      <stop offset="0.55" stop-color="#E08A66"/>
      <stop offset="1" stop-color="#C4623F"/>
    </linearGradient>
    <radialGradient id="shine" cx="0.32" cy="0.22" r="0.65">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="0.6" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blush" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FF6E7E" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#FF6E7E" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="6" result="off"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.18"/>
      </feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Cat ears (behind body so they peek above) -->
  <g>
    <path d="M96 168 L70 38 Q66 18 86 26 L208 88 Z" fill="#C4623F"/>
    <path d="M416 168 L442 38 Q446 18 426 26 L304 88 Z" fill="#C4623F"/>
    <path d="M118 156 L102 70 Q100 58 112 64 L188 100 Z" fill="#FFC2AC" opacity="0.9"/>
    <path d="M394 156 L410 70 Q412 58 400 64 L324 100 Z" fill="#FFC2AC" opacity="0.9"/>
  </g>

  <!-- Body: rounded square -->
  <rect x="40" y="80" width="432" height="400" rx="116" ry="116" fill="url(#bodyGrad)"/>
  <rect x="40" y="80" width="432" height="400" rx="116" ry="116" fill="url(#shine)"/>

  <!-- Inner highlight rim -->
  <rect x="56" y="96" width="400" height="368" rx="100" ry="100"
        fill="none" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="3"/>

  <!-- Blush -->
  <ellipse cx="138" cy="320" rx="46" ry="26" fill="url(#blush)"/>
  <ellipse cx="374" cy="320" rx="46" ry="26" fill="url(#blush)"/>

  <!-- Eyes: happy closed arcs ^_^ -->
  <g fill="none" stroke="#2A140A" stroke-width="20" stroke-linecap="round">
    <path d="M156 264 Q198 214 240 264"/>
    <path d="M272 264 Q314 214 356 264"/>
  </g>

  <!-- Tiny eye sparkles -->
  <circle cx="232" cy="232" r="6" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="348" cy="232" r="6" fill="#FFFFFF" opacity="0.9"/>

  <!-- Smile -->
  <path d="M210 332 Q256 388 302 332"
        fill="none" stroke="#2A140A" stroke-width="18" stroke-linecap="round"/>

  <!-- Tongue peek -->
  <path d="M242 358 Q256 384 270 358 Q260 372 242 358 Z" fill="#FF7B95"/>
</svg>
