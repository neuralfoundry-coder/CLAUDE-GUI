apiVersion: v1
kind: Service
metadata:
  name: claudegui
  namespace: claudegui-dev
  labels:
    app.kubernetes.io/name: claudegui
    app.kubernetes.io/component: server
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: claudegui
  ports:
    - name: http
      port: 3000
      targetPort: http
      # NodePort is cluster-specific; dev.sh --k8s prefers `kubectl port-forward`
      # for a stable localhost binding regardless of the cluster's node IP.
      nodePort: 30030
